{% extends "base.html" %}

{% block title %}Chat - SABA{% endblock %}

{% block extra_css %}
<style>
    .chat-page {
        --chat-content-max: 1120px;
        --chat-gutter: clamp(1rem, 3vw, 2rem);
        height: calc(100vh - 62px);
        height: calc(100dvh - 62px);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
        background: var(--chat-bg);
    }

    /* Chat Messages Area */
    .chat-messages-area {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.5rem var(--chat-gutter) 200px;
        max-width: var(--chat-content-max);
        margin: 0 auto;
        width: 100%;
        scroll-behavior: smooth;
        position: relative;
        z-index: 1;
    }

    /* Bubble alignment must be controlled by their direct parent. */
    #chat-messages {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        width: 100%;
        min-width: 0;
    }

    /* Date Separator */
    .date-separator {
        text-align: center;
        margin: 0.5rem 0;
    }
    .date-separator span {
        background: var(--bg-surface);
        color: var(--text-muted);
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        padding: 0.3rem 1rem;
        border-radius: 20px;
    }

    /* Bubble Wrapper */
    .bubble-wrap {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        width: fit-content;
        max-width: min(76%, 760px);
        min-width: 0;
        animation: bubbleIn 0.3s ease-out;
    }
    .bubble-wrap.user { align-self: flex-end; align-items: flex-end; }
    .bubble-wrap.ai { align-self: flex-start; align-items: flex-start; }

    /* Bubble Label */
    .bubble-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }
    .bubble-label.user { color: var(--primary-light); }
    .bubble-label.ai { color: var(--accent); }

    .bubble-label .avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.6rem;
        font-weight: 700;
    }
    .bubble-label.user .avatar {
        background: var(--primary);
        color: white;
    }
    .bubble-label.ai .avatar {
        background: var(--bg-surface);
        color: var(--accent);
        border: 1px solid var(--border-color);
    }

    /* Bubble */
    .bubble {
        padding: 1rem 1.15rem;
        border-radius: var(--radius-lg);
        position: relative;
        line-height: 1.6;
        font-size: 0.95rem;
        max-width: 100%;
        overflow-wrap: anywhere;
    }
    .bubble.user {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 15px var(--primary-glow);
    }
    .bubble.ai {
        background: var(--bg-card);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        border-bottom-left-radius: 4px;
    }
    .bubble.ai.ai-error {
        background: rgba(239, 68, 68, 0.08);
        border-color: rgba(239, 68, 68, 0.3);
        color: var(--text-primary);
    }

    /* Timestamp */
    .bubble-time {
        font-size: 0.65rem;
        color: var(--text-muted);
        padding: 0 0.25rem;
        letter-spacing: -0.3px;
    }

    /* Audio Player in Bubble */
    .chat-audio-player {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
    }
    .audio-play-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: rgba(255,255,255,0.2);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
    }
    .audio-play-btn:hover { background: rgba(255,255,255,0.3); }
    .audio-progress {
        height: 6px;
        background: rgba(255,255,255,0.2);
        border-radius: 3px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
        flex: 1;
        min-width: 100px;
    }
    .audio-progress-bar {
        height: 100%;
        background: white;
        border-radius: 3px;
        width: 0;
        transition: width 0.1s linear;
        pointer-events: none;
    }
    .audio-duration {
        font-size: 0.7rem;
        color: rgba(255,255,255,0.7);
        font-weight: 500;
    }

    /* Expired Audio */
    .bubble.expired {
        background: var(--bg-surface);
        color: var(--text-muted);
        border: 1px solid var(--border-color);
    }

    /* Dark mode needs stronger separation than the page background. */
    [data-bs-theme="dark"] .bubble.ai {
        background: #202e43;
        color: #f8fafc;
        border-color: rgba(148, 163, 184, 0.3);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    [data-bs-theme="dark"] .bubble.expired {
        background: #2a3a50;
        color: #cbd5e1;
        border-color: rgba(148, 163, 184, 0.34);
    }

    [data-bs-theme="dark"] .bubble.expired > .d-flex {
        opacity: 0.85 !important;
    }

    [data-bs-theme="dark"] .bubble-time {
        color: #94a3b8;
    }

    [data-bs-theme="dark"] .date-separator span {
        color: #cbd5e1;
        background: #334155;
        border: 1px solid rgba(148, 163, 184, 0.22);
    }

    /* Typing Indicator */
    .typing-dots {
        display: flex;
        gap: 5px;
        padding: 0.25rem 0;
    }
    .typing-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes typingBounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
    }
    @keyframes bubbleIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Floating Mic Container */
    .floating-mic-container {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1040;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
    }

    .mic-btn {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        border: none;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 20px var(--primary-glow);
        -webkit-tap-highlight-color: transparent;
    }
    .mic-btn:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 30px var(--primary-glow);
    }
    .mic-btn:active { transform: scale(0.95); }

    .mic-btn.recording {
        background: linear-gradient(135deg, var(--danger), #dc2626);
        box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        animation: pulse-record 1.5s ease-in-out infinite;
    }
    .mic-btn.processing {
        background: linear-gradient(135deg, var(--accent), #0891b2);
        box-shadow: 0 4px 20px var(--accent-glow);
    }

    @keyframes pulse-record {
        0%, 100% { box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4); }
        50% { box-shadow: 0 4px 35px rgba(239, 68, 68, 0.6); }
    }

    .mic-status {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        padding: 0.35rem 1rem;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-secondary);
        backdrop-filter: blur(10px);
        white-space: nowrap;
        transition: all 0.3s ease;
        opacity: 0;
        transform: translateY(8px);
    }
    .mic-status.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* Audio Deleted Banner */
    .audio-deleted-banner {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: var(--danger);
        font-size: 0.78rem;
        font-weight: 500;
        padding: 0.5rem 2.5rem 0.5rem 1rem;
        border-radius: var(--radius-md);
        text-align: center;
        display: none;
        width: min(calc(100% - 2rem), 680px);
        flex-shrink: 0;
        position: relative;
    }

    #close-banner-btn {
        position: absolute;
        top: 50%;
        right: 0.85rem;
        transform: translateY(-50%);
    }

    /* Gradient fade above mic so chat fades out smoothly */
    .chat-fade-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 180px;
        background: linear-gradient(to bottom, transparent 0%, var(--chat-bg) 70%);
        pointer-events: none;
        z-index: 10;
    }

    /* ---- Mobile Chat Responsive ---- */
    @media (max-width: 768px) {
        .chat-page {
            --chat-gutter: 0.75rem;
            height: calc(100vh - 56px);
            height: calc(100dvh - 56px);
        }

        .chat-messages-area {
            padding: 1rem var(--chat-gutter) 180px;
        }

        #chat-messages {
            gap: 1rem;
        }

        .chat-fade-overlay {
            height: 150px;
        }

        .bubble-wrap {
            max-width: 100%;
        }

        .bubble-wrap.user { max-width: 88%; }
        .bubble-wrap.ai { max-width: 100%; }

        .bubble {
            padding: 0.75rem 0.9rem;
            font-size: 0.85rem;
            line-height: 1.5;
            border-radius: 12px;
        }

        .bubble.user {
            border-bottom-right-radius: 3px;
        }

        .bubble.ai {
            border-bottom-left-radius: 3px;
        }

        .bubble-label {
            font-size: 0.55rem;
            letter-spacing: 1.2px;
            gap: 0.35rem;
        }

        .bubble-label .avatar {
            width: 20px;
            height: 20px;
            font-size: 0.5rem;
        }

        .bubble-time {
            font-size: 0.55rem;
        }

        .date-separator span {
            font-size: 0.6rem;
            padding: 0.25rem 0.75rem;
        }

        /* Audio player compact */
        .chat-audio-player {
            gap: 0.5rem;
        }

        .audio-play-btn {
            width: 34px;
            height: 34px;
        }

        .audio-duration {
            font-size: 0.6rem;
        }

        /* Mic smaller */
        .floating-mic-container {
            bottom: 1.25rem;
        }

        .mic-btn {
            width: 52px;
            height: 52px;
            font-size: 1.15rem;
        }

        .mic-status {
            font-size: 0.6rem;
            padding: 0.25rem 0.75rem;
        }

        .audio-deleted-banner {
            width: calc(100% - 1.5rem);
        }
    }

    @media (max-width: 400px) {
        .chat-page {
            --chat-gutter: 0.5rem;
        }

        .chat-messages-area {
            padding: 0.75rem var(--chat-gutter) 160px;
        }

        #chat-messages {
            gap: 0.75rem;
        }

        .chat-fade-overlay {
            height: 130px;
        }

        .bubble-wrap {
            max-width: 100%;
        }

        .bubble-wrap.user { max-width: 90%; }

        .bubble {
            padding: 0.6rem 0.75rem;
            font-size: 0.8rem;
        }

        .bubble-label {
            font-size: 0.5rem;
        }

        .audio-deleted-banner {
            width: calc(100% - 1rem);
            padding-left: 0.75rem;
            padding-right: 2rem;
            font-size: 0.7rem;
        }

        #close-banner-btn {
            right: 0.65rem;
        }

        .mic-btn {
            width: 46px;
            height: 46px;
            font-size: 1rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="chat-page">
    <!-- Audio Deleted Banner -->
    <div class="audio-deleted-banner mx-auto mt-2" id="audio-deleted-banner">
        <i class="bi bi-exclamation-circle-fill me-1"></i>
        Audio lama tidak tersedia (terhapus otomatis)
        <button class="btn btn-sm btn-link text-danger p-0 ms-2" id="close-banner-btn"><i class="bi bi-x-lg"></i></button>
    </div>

    <!-- Chat Messages -->
    <div class="chat-messages-area" id="chat-container">
        <div id="chat-messages">
            <div id="chat-loading" class="d-flex justify-content-center align-items-center p-5">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                <span class="ms-2 text-muted small">Memuat chat...</span>
            </div>
        </div>
    </div>

    <!-- Gradient fade overlay -->
    <div class="chat-fade-overlay"></div>

    <!-- Floating Mic -->
    <div class="floating-mic-container" style="z-index:20;">
        <div class="mic-status" id="mic-status-container">
            <span id="mic-status-text">Mendengarkan...</span>
        </div>
        <button class="mic-btn" id="chat-mic-button" title="Tahan untuk merekam">
            <i class="bi bi-mic-fill" id="mic-icon"></i>
        </button>
        <span class="mic-status visible" style="opacity:1;transform:none;font-size:0.6rem;letter-spacing:2px;" id="mic-instruction">TAHAN UNTUK MEREKAM</span>
    </div>
</div>

<script>
    window.USER_INITIALS = "{{ user.name[:2] | upper if user else 'U' }}";
</script>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
