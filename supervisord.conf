[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:flask]
command=gunicorn app:app --bind 127.0.0.1:5000 --workers 1 --timeout 120
directory=/app
autostart=true
autorestart=true
stdout_logfile=/tmp/flask.log
stderr_logfile=/tmp/flask.err

[program:n8n]
command=n8n start
autostart=true
autorestart=true
stdout_logfile=/tmp/n8n.log
stderr_logfile=/tmp/n8n.err

[program:nginx]
command=nginx -c /app/nginx.conf -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/tmp/nginx.log
stderr_logfile=/tmp/nginx.err
