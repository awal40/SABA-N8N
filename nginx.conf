pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    access_log          /tmp/nginx_access.log;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream n8n_backend {
        server 127.0.0.1:5678;
    }

    server {
        listen 7860;
        server_name localhost;

        client_max_body_size 50M;

        # Redirect /n8n ke /n8n/
        location = /n8n {
            return 301 /n8n/;
        }

        # n8n Editor & API - strip /n8n/ prefix
        location /n8n/ {
            proxy_pass http://n8n_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # KRITIS: Rewrite redirect headers dari n8n agar mengarah ke /n8n/
            proxy_redirect / /n8n/;
            proxy_redirect http:// https://;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Matikan buffering untuk SSE/push
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # n8n aset statis (direferensikan tanpa /n8n/ prefix oleh HTML)
        location /assets/ {
            proxy_pass http://n8n_backend/assets/;
            proxy_set_header Host $host;
        }

        # n8n REST API + SSE push
        location /rest/ {
            proxy_pass http://n8n_backend/rest/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Matikan buffering untuk SSE/push
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # n8n Webhooks
        location /webhook/ {
            proxy_pass http://n8n_backend/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /webhook-test/ {
            proxy_pass http://n8n_backend/webhook-test/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Route utama ke Flask App
        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
