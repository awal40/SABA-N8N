pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    access_log          /tmp/nginx_access.log;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 7860;
        server_name localhost;

        client_max_body_size 50M;

        # Redirect /n8n ke /n8n/
        location = /n8n {
            return 302 https://$host/n8n/;
        }

        # Normalisasi URL dobel yang bisa tersimpan dari percobaan base path sebelumnya.
        location = /n8n/n8n {
            return 302 https://$host/n8n/;
        }

        location ^~ /n8n/n8n/ {
            return 302 https://$host/n8n/;
        }

        # Webhook produksi harus tetap dapat dipanggil aplikasi tanpa kredensial editor.
        location ^~ /n8n/webhook/ {
            proxy_pass http://127.0.0.1:5678/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Prefix /n8n;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect off;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Endpoint waiting webhook dipisahkan karena dapat menunggu lebih lama.
        location ^~ /n8n/webhook-waiting/ {
            proxy_pass http://127.0.0.1:5678/webhook-waiting/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Prefix /n8n;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect off;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Editor, API internal, aset, dan test webhook n8n memerlukan autentikasi tambahan.
        # Dengan N8N_PATH=/n8n/, prefix ini dipotong saat masuk ke n8n internal.
        location /n8n/ {
            auth_basic "SABA n8n Editor";
            auth_basic_user_file /tmp/n8n_editor.htpasswd;

            proxy_pass http://127.0.0.1:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Prefix /n8n;

            # WebSocket support (sangat penting untuk N8N_PUSH_BACKEND=websocket)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_redirect off;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
            add_header X-Accel-Buffering no;
            add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Route utama ke Flask App
        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
